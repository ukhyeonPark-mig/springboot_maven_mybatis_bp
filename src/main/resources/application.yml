# ── 공통 설정 (모든 프로파일) ─────────────────────────────────────
# 환경 변수 매핑은 PRD §11을 따른다. 기본값은 로컬 개발에 적합하도록 설정됨.
spring:
  application:
    name: bp
  profiles:
    active: ${APP_ENV:local}

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_DATABASE:bp}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:dnrgus2022@@}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 스키마는 Flyway가 관리한다 (Laravel 마이그레이션 + schema.sql을 대체)
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # DB 기반 세션; SPRING_SESSION DDL은 Flyway가 관리한다 (자동 초기화하지 않음)
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: never
    timeout: 30m

  servlet:
    multipart:
      max-file-size: 10MB          # 문의 첨부파일 (프로필 2MB 제한은 코드에서 적용)
      max-request-size: 12MB

  jackson:
    time-zone: Asia/Seoul

  messages:
    basename: messages
    encoding: UTF-8

  web:
    locale: ko
    locale-resolver: fixed

mybatis:
  mapper-locations: classpath:mappers/*.xml
  type-aliases-package: com.example.bp.domain
  configuration:
    map-underscore-to-camel-case: true

# ── 애플리케이션 전용 설정 (@ConfigurationProperties "app") ───────────
app:
  name: ${APP_NAME:BP}
  url: ${APP_URL:http://localhost:8080}
  r2:
    access-key-id: ${R2_ACCESS_KEY_ID:}
    secret-access-key: ${R2_SECRET_ACCESS_KEY:}
    endpoint: ${R2_ENDPOINT:}
    public-bucket: ${R2_PUBLIC_BUCKET:}
    public-url: ${R2_PUBLIC_URL:}
    private-bucket: ${R2_PRIVATE_BUCKET:}
  turnstile:
    site-key: ${TURNSTILE_SITE_KEY:}
    secret-key: ${TURNSTILE_SECRET_KEY:}
  ses:
    access-key-id: ${SES_ACCESS_KEY_ID:}
    secret-access-key: ${SES_SECRET_ACCESS_KEY:}
    region: ${SES_DEFAULT_REGION:ap-northeast-2}
  mail:
    from-address: ${MAIL_FROM_ADDRESS:no-reply@example.com}
    from-name: ${MAIL_FROM_NAME:BP}
  contact:
    to-address: ${CONTACT_TO_ADDRESS:}
    to-name: ${CONTACT_TO_NAME:}

server:
  port: ${SERVER_PORT:8080}

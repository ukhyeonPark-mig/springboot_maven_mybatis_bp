<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/app}">
<head>
    <th:block layout:fragment="seo">
        <title th:text="'문의하기 — ' + ${appName}">문의하기</title>
        <meta name="description" th:content="${appName} + ' 문의 창구입니다. 궁금하신 점을 자유롭게 남겨주세요.'"/>
    </th:block>
    <th:block layout:fragment="css">
        <style>
            #contactBtn .htmx-indicator { display: none; }
            #contactBtn.htmx-request .label { display: none; }
            #contactBtn.htmx-request .htmx-indicator { display: inline-flex; }
        </style>
    </th:block>
</head>
<body>
<div layout:fragment="content">
    <div class="page-body">
        <div class="container container-narrow py-5">
            <div id="contact-card" th:fragment="card">
                <th:block th:replace="~{fragments/message :: toasts}"></th:block>
                <div class="card">
                    <div class="card-body">
                        <h1 class="h2 mb-1">문의하기</h1>
                        <p class="text-secondary mb-4">아래 양식을 통해 문의해 주시면 빠른 시일 내에 답변 드리겠습니다.</p>

                        <form hx-post="/contact" hx-target="#contact-card" hx-swap="outerHTML"
                              hx-encoding="multipart/form-data" hx-indicator="#contactBtn">
                            <div class="mb-3">
                                <label class="form-label required">이름</label>
                                <input name="name" type="text" class="form-control" placeholder="홍길동" th:value="${name}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label required">이메일</label>
                                <input name="email" type="email" class="form-control" placeholder="you@example.com" th:value="${email}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label required">제목</label>
                                <input name="subject" type="text" class="form-control" placeholder="문의 제목을 입력하세요" th:value="${subject}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label required">메시지</label>
                                <textarea name="message" rows="6" class="form-control" placeholder="문의 내용을 자세히 작성해 주세요" th:text="${message}"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">첨부 파일 (선택)</label>
                                <input name="file" type="file" class="form-control">
                                <small class="form-hint">최대 10MB까지 첨부할 수 있습니다.</small>
                            </div>

                            <div class="mb-3" th:if="${turnstileEnabled}">
                                <div class="cf-turnstile" th:attr="data-sitekey=${turnstileSiteKey}" data-callback="onContactTurnstileSuccess"></div>
                                <input type="hidden" name="turnstileToken" id="contactTurnstileToken"/>
                            </div>

                            <div class="d-flex justify-content-end">
                                <button type="submit" id="contactBtn" class="btn btn-primary">
                                    <span class="label">보내기</span>
                                    <span class="htmx-indicator align-items-center">
                                        <span class="spinner-border spinner-border-sm me-2" role="status"></span>전송 중...
                                    </span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="js">
    <script>
        function onContactTurnstileSuccess(token) {
            var f = document.getElementById('contactTurnstileToken');
            if (f) f.value = token;
        }
        document.body.addEventListener('turnstileReset', function () {
            if (window.turnstile) { window.turnstile.reset(); }
        });
    </script>
    <script th:if="${turnstileEnabled}" src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</th:block>
</body>
</html>

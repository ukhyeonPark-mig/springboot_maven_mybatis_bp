<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout :: layout(~{::content})}">
<body>
<th:block th:fragment="content">
<div class="card">
    <div class="card-header bg-white">
        <h5 class="mb-0"><i class="bi bi-file-text me-2"></i>게시글 상세</h5>
    </div>
    <div class="card-body">
        <h4 class="card-title mb-3" th:text="${board.title}">제목</h4>
        <div class="d-flex justify-content-between text-muted border-bottom pb-3 mb-4">
            <div>
                <i class="bi bi-person me-1"></i><span th:text="${board.author}">작성자</span>
                <span class="mx-2">|</span>
                <i class="bi bi-calendar3 me-1"></i>
                <span th:text="${board.createdAt != null ? #temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm') : ''}">2026-01-01 00:00</span>
            </div>
            <div>
                <i class="bi bi-eye me-1"></i>조회 <span th:text="${board.viewCount}">0</span>
            </div>
        </div>
        <div class="card-text mb-4" style="min-height: 200px; white-space: pre-wrap; line-height: 1.8;"
             th:text="${board.content}">내용</div>
    </div>
    <div class="card-footer bg-white">
        <div class="d-flex justify-content-between">
            <a href="/board" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-list-ul me-1"></i>목록
            </a>
            <div>
                <a th:href="@{/board/{id}/edit(id=${board.id})}" class="btn btn-outline-dark btn-sm me-1">
                    <i class="bi bi-pencil me-1"></i>수정
                </a>
                <button type="button" class="btn btn-outline-danger btn-sm" data-bs-toggle="modal" data-bs-target="#deleteModal">
                    <i class="bi bi-trash me-1"></i>삭제
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 삭제 확인 모달 -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title"><i class="bi bi-exclamation-triangle me-2"></i>삭제 확인</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                정말로 이 게시글을 삭제하시겠습니까?<br>
                <small class="text-muted">삭제된 게시글은 복구할 수 없습니다.</small>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">취소</button>
                <form th:action="@{/board/{id}/delete(id=${board.id})}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-sm btn-danger">
                        <i class="bi bi-trash me-1"></i>삭제
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
</th:block>
</body>
</html>

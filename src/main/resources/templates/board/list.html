<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout :: layout(~{::content})}">
<body>
<th:block th:fragment="content">
<div class="card">
    <div class="card-header bg-white">
        <div class="row align-items-center">
            <div class="col">
                <h5 class="mb-0"><i class="bi bi-list-ul me-2"></i>게시글 목록</h5>
            </div>
            <div class="col-auto">
                <span class="badge bg-secondary">총 <span th:text="${totalCount}">0</span>건</span>
            </div>
        </div>
    </div>
    <div class="card-body">
        <!-- 검색 -->
        <form action="/board" method="get" class="mb-3">
            <div class="row g-2 justify-content-center">
                <div class="col-auto">
                    <select name="searchType" class="form-select form-select-sm">
                        <option value="all" th:selected="${search.searchType == 'all'}">전체</option>
                        <option value="title" th:selected="${search.searchType == 'title'}">제목</option>
                        <option value="content" th:selected="${search.searchType == 'content'}">내용</option>
                        <option value="author" th:selected="${search.searchType == 'author'}">작성자</option>
                    </select>
                </div>
                <div class="col-auto">
                    <input type="text" name="keyword" class="form-control form-control-sm"
                           placeholder="검색어를 입력하세요" th:value="${search.keyword}">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-sm btn-dark">
                        <i class="bi bi-search me-1"></i>검색
                    </button>
                </div>
            </div>
        </form>

        <!-- 테이블 -->
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                    <tr class="text-center">
                        <th style="width:70px">번호</th>
                        <th>제목</th>
                        <th style="width:100px">작성자</th>
                        <th style="width:140px">작성일</th>
                        <th style="width:80px">조회</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="board : ${boardList}">
                        <td class="text-center" th:text="${board.id}">1</td>
                        <td>
                            <a th:href="@{/board/{id}(id=${board.id})}" class="text-decoration-none text-dark fw-semibold"
                               th:text="${board.title}">제목</a>
                        </td>
                        <td class="text-center" th:text="${board.author}">작성자</td>
                        <td class="text-center"
                            th:text="${board.createdAt != null ? #temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm') : ''}">2026-01-01 00:00</td>
                        <td class="text-center">
                            <span class="badge bg-light text-dark" th:text="${board.viewCount}">0</span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(boardList)}">
                        <td colspan="5" class="text-center py-5 text-muted">
                            <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                            게시글이 없습니다.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="card-footer bg-white">
        <div class="row align-items-center">
            <div class="col">
                <!-- 페이징 -->
                <nav th:if="${totalPages > 1}">
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item" th:classappend="${search.page <= 1} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/board(page=${search.page - 1}, size=${search.size}, searchType=${search.searchType}, keyword=${search.keyword})}">
                                <i class="bi bi-chevron-left"></i>
                            </a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                            th:classappend="${search.page == i} ? 'active'">
                            <a class="page-link"
                               th:href="@{/board(page=${i}, size=${search.size}, searchType=${search.searchType}, keyword=${search.keyword})}"
                               th:text="${i}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${search.page >= totalPages} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/board(page=${search.page + 1}, size=${search.size}, searchType=${search.searchType}, keyword=${search.keyword})}">
                                <i class="bi bi-chevron-right"></i>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
            <div class="col-auto">
                <a href="/board/write" class="btn btn-dark btn-sm btn-write">
                    <i class="bi bi-pencil-square me-1"></i>글쓰기
                </a>
            </div>
        </div>
    </div>
</div>
</th:block>
</body>
</html>

<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/app}">
<head>
    <th:block layout:fragment="seo">
        <title th:text="'비밀번호 변경 — ' + ${appName}">비밀번호 변경</title>
        <meta name="robots" content="noindex, nofollow"/>
    </th:block>
</head>
<body>
<div layout:fragment="content">
    <section class="pt-4">
        <div class="container-xl px-3">
            <div class="row g-2 align-items-center">
                <div class="col">
                    <h2 class="page-title">비밀번호 변경</h2>
                    <div class="page-pretitle">계정의 비밀번호를 변경합니다.</div>
                </div>
            </div>
        </div>
    </section>

    <div class="page-body">
        <div class="container-xl">
            <div class="row">
                <div class="col-xl-6 mb-2">
                    <div id="password-card" th:fragment="card">
                        <th:block th:replace="~{fragments/message :: toasts}"></th:block>
                        <div class="card">
                            <div class="card-body">
                                <h4 class="card-title">비밀번호 변경</h4>
                                <hr class="my-2">
                                <form hx-post="/client/password" hx-target="#password-card" hx-swap="outerHTML">
                                    <div class="mb-2">
                                        <label for="current_password" class="form-label">현재 비밀번호</label>
                                        <input name="current_password" type="password" class="form-control"
                                               id="current_password" autocomplete="current-password">
                                    </div>
                                    <div class="mb-2">
                                        <label for="new_password" class="form-label">새로운 비밀번호</label>
                                        <input name="new_password" type="password" class="form-control"
                                               id="new_password" autocomplete="new-password">
                                    </div>
                                    <div class="mb-2">
                                        <label for="new_password_confirmation" class="form-label">새로운 비밀번호 확인</label>
                                        <input name="new_password_confirmation" type="password" class="form-control"
                                               id="new_password_confirmation" autocomplete="new-password">
                                    </div>
                                    <small class="text-muted mb-4 d-block" th:text="#{password.policy}">
                                        비밀번호는 8~15자이며 대문자, 소문자, 숫자, 특수문자를 각각 1자 이상 포함해야 합니다.
                                    </small>
                                    <div class="text-end">
                                        <button type="submit" class="btn btn-primary">비밀번호 변경</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/admin}">
<head>
    <th:block layout:fragment="seo">
        <title th:text="'사용자 — ' + ${appName}">사용자</title>
    </th:block>
</head>
<body>
<div layout:fragment="content">
    <div class="page-body px-xl-3">
        <div class="container-xl">
            <div id="user-panel" th:fragment="panel">
                <th:block th:replace="~{fragments/message :: toasts}"></th:block>

                <!-- autocomplete decoys (reference parity) -->
                <input type="text" name="fake_name" autocomplete="name" style="display:none">
                <input type="email" name="fake_email" autocomplete="email" style="display:none">
                <input type="password" name="fake_password" autocomplete="new-password" style="display:none">

                <!-- shared filter state for hx-include -->
                <input type="hidden" id="filterRole" name="role" th:value="${role}">
                <input type="hidden" id="filterPage" name="page" th:value="${page}">

                <div class="row">
                    <div class="col-auto mb-2">
                        <div class="input-icon">
                            <span class="input-icon-addon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" /><path d="M21 21l-6 -6" /></svg>
                            </span>
                            <input id="searchInput" name="search" type="search" class="form-control" placeholder="검색..."
                                   aria-label="Search" th:value="${search}"
                                   hx-get="/admin/user/panel" hx-target="#user-panel" hx-swap="outerHTML"
                                   hx-trigger="keyup changed delay:500ms, search" hx-include="#filterRole"/>
                        </div>
                    </div>
                    <div class="col-auto d-flex align-items-center mb-2">
                        <a href="javascript:void(0)" class="px-2" th:classappend="${role == 'all'} ? 'text-primary' : 'text-dark'"
                           hx-get="/admin/user/panel" hx-vals='{"role":"all"}' hx-include="#searchInput" hx-target="#user-panel" hx-swap="outerHTML">
                            <span th:text="'모든 역할(' + ${countAll} + ')'">모든 역할(0)</span>
                        </a>
                        <a href="javascript:void(0)" class="px-2" th:classappend="${role == 'client'} ? 'text-primary' : 'text-dark'"
                           hx-get="/admin/user/panel" hx-vals='{"role":"client"}' hx-include="#searchInput" hx-target="#user-panel" hx-swap="outerHTML">
                            <span th:text="'사용자(' + ${countClient} + ')'">사용자(0)</span>
                        </a>
                        <a href="javascript:void(0)" class="px-2" th:classappend="${role == 'admin'} ? 'text-primary' : 'text-dark'"
                           hx-get="/admin/user/panel" hx-vals='{"role":"admin"}' hx-include="#searchInput" hx-target="#user-panel" hx-swap="outerHTML">
                            <span th:text="'관리자(' + ${countAdmin} + ')'">관리자(0)</span>
                        </a>
                    </div>
                    <div class="col-auto mb-2 ms-auto">
                        <button class="btn btn-primary" hx-target="#user-panel" hx-swap="outerHTML" hx-include="#searchInput,#filterRole,#filterPage"
                                th:attr="hx-get=${mode == 'create'} ? '/admin/user/panel?mode=none' : '/admin/user/panel?mode=create'">
                            <th:block th:if="${mode != 'create'}">
                                <svg xmlns="http://www.w3.org/2000/svg" class="icon me-2" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M12 5l0 14"/><path d="M5 12l14 0"/></svg> 새로운 사용자
                            </th:block>
                            <th:block th:if="${mode == 'create'}">
                                <svg xmlns="http://www.w3.org/2000/svg" class="icon me-2" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M6 15l6 -6l6 6"/></svg> 닫기
                            </th:block>
                        </button>
                    </div>
                </div>

                <!-- Create card -->
                <div class="card mb-2" th:if="${mode == 'create'}">
                    <div class="card-body">
                        <h3>새로운 사용자</h3>
                        <hr class="my-2">
                        <form hx-post="/admin/user/create" hx-target="#user-panel" hx-swap="outerHTML">
                            <input type="hidden" name="search" th:value="${search}">
                            <input type="hidden" name="filterRole" th:value="${role}">
                            <input type="hidden" name="page" th:value="${page}">
                            <div class="row">
                                <div class="col-xl-3 mb-2">
                                    <h5 class="mb-1">이메일</h5>
                                    <div class="input-group">
                                        <input id="createEmailInput" name="email" type="email" class="form-control" th:value="${createUserEmail}">
                                        <button type="button" class="btn btn-secondary px-2"
                                                hx-post="/admin/user/check-email" hx-include="#createEmailInput"
                                                hx-target="#emailFeedback" hx-swap="innerHTML">중복 확인</button>
                                    </div>
                                    <div id="emailFeedback">
                                        <th:block th:insert="~{admin/user :: emailFeedback}"></th:block>
                                    </div>
                                </div>
                                <div class="col-xl-3 mb-2">
                                    <h5 class="mb-1">이름</h5>
                                    <input name="name" type="text" class="form-control" placeholder="name" th:value="${createUserName}">
                                </div>
                                <div class="col-xl-3 mb-2">
                                    <h5 class="mb-1">비밀번호</h5>
                                    <input name="password" type="password" class="form-control">
                                </div>
                                <div class="col-xl-3 mb-2">
                                    <h5 class="mb-1">역할</h5>
                                    <select name="role" class="form-select">
                                        <option value="client" th:selected="${createUserRole != 'admin'}">사용자</option>
                                        <option value="admin" th:selected="${createUserRole == 'admin'}">관리자</option>
                                    </select>
                                </div>
                                <div class="col-xl-12 mb-2 d-flex">
                                    <button type="submit" class="btn btn-primary ms-auto">저장</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Edit card -->
                <div class="card mb-2" th:if="${mode == 'edit'}">
                    <div class="card-body">
                        <h3>사용자 수정</h3>
                        <hr class="my-2">
                        <form hx-post="/admin/user/update" hx-target="#user-panel" hx-swap="outerHTML">
                            <input type="hidden" name="id" th:value="${editUserId}">
                            <input type="hidden" name="search" th:value="${search}">
                            <input type="hidden" name="filterRole" th:value="${role}">
                            <input type="hidden" name="page" th:value="${page}">
                            <div class="row">
                                <div class="col-xl-3 mb-2">
                                    <h5 class="mb-1">이메일</h5>
                                    <input type="email" class="form-control bg-light" th:value="${editUserEmail}" readonly>
                                </div>
                                <div class="col-xl-3 mb-2">
                                    <h5 class="mb-1">이름</h5>
                                    <input name="name" type="text" class="form-control" placeholder="name" th:value="${editUserName}">
                                </div>
                                <div class="col-xl-3 mb-2">
                                    <h5 class="mb-1">비밀번호</h5>
                                    <input name="password" type="password" class="form-control">
                                </div>
                                <div class="col-xl-3 mb-2">
                                    <h5 class="mb-1">역할</h5>
                                    <select name="role" class="form-select">
                                        <option value="client" th:selected="${editUserRole != 'admin'}">사용자</option>
                                        <option value="admin" th:selected="${editUserRole == 'admin'}">관리자</option>
                                    </select>
                                </div>
                                <div class="col-xl-12 mt-1 mb-2 d-flex">
                                    <button type="button" class="btn btn-secondary ms-auto me-2"
                                            hx-get="/admin/user/panel?mode=none" hx-include="#searchInput,#filterRole,#filterPage"
                                            hx-target="#user-panel" hx-swap="outerHTML">닫기</button>
                                    <button type="submit" class="btn btn-primary">수정</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <table class="table table-responsive table-sm table-striped">
                    <thead>
                        <tr><th>ID</th><th>이메일</th><th>이름</th><th>역할</th><th>로그인</th><th></th></tr>
                    </thead>
                    <tbody>
                        <tr class="align-middle" th:each="u : ${users}">
                            <td class="ps-1"><small th:text="${u.id}">1</small></td>
                            <td>
                                <span class="nav-link d-flex lh-1 p-0 px-2">
                                    <span class="avatar avatar-sm"
                                          th:style="'background-image: url(' + (${u.profileImage != null} ? (${r2PublicUrl} + '/user/profile_image/100/' + ${u.profileImage}) : '/theme/no_profile_image.webp') + ')'"></span>
                                    <div class="d-none d-xl-block ps-2">
                                        <div class="mt-1 small text-secondary" th:text="${u.email}">email</div>
                                    </div>
                                </span>
                            </td>
                            <td><small th:text="${u.name}">name</small></td>
                            <td>
                                <span th:if="${u.role == 'admin'}" class="badge bg-blue-lt text-blue-lt-fg">관리자</span>
                                <span th:if="${u.role == 'client'}" class="badge bg-purple-lt text-purple-lt-fg">사용자</span>
                            </td>
                            <td>
                                <span class="badge bg-dark text-white" style="cursor: pointer"
                                      th:attr="hx-post='/admin/user/impersonate/' + ${u.id}" hx-target="#user-panel" hx-swap="outerHTML">로그인</span>
                            </td>
                            <td class="text-end pe-1">
                                <span class="text-primary" style="cursor: pointer" hx-target="#user-panel" hx-swap="outerHTML"
                                      hx-include="#searchInput,#filterRole,#filterPage"
                                      th:attr="hx-get='/admin/user/edit/' + ${u.id}">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="icon me-2" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M7 7h-1a2 2 0 0 0 -2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2 -2v-1"/><path d="M20.385 6.585a2.1 2.1 0 0 0 -2.97 -2.97l-8.415 8.385v3h3l8.385 -8.415z"/><path d="M16 5l3 3"/></svg>
                                </span>
                                <span class="text-danger" style="cursor: pointer" hx-confirm="정말 이 사용자를 삭제하시겠습니까?"
                                      hx-target="#user-panel" hx-swap="outerHTML" hx-include="#searchInput,#filterRole,#filterPage"
                                      th:attr="hx-post='/admin/user/delete/' + ${u.id}">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 7l16 0"/><path d="M10 11l0 6"/><path d="M14 11l0 6"/><path d="M5 7l1 12a2 2 0 0 0 2 2h8a2 2 0 0 0 2 -2l1 -12"/><path d="M9 7v-3a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v3"/></svg>
                                </span>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <div class="row mb-2" th:if="${totalPages > 1}">
                    <ul class="pagination">
                        <li class="page-item" th:each="p : ${#numbers.sequence(1, totalPages)}" th:classappend="${p == page} ? 'active'">
                            <a class="page-link" href="javascript:void(0)"
                               hx-get="/admin/user/panel" th:attr="hx-vals='{&quot;page&quot;:' + ${p} + '}'"
                               hx-include="#searchInput,#filterRole" hx-target="#user-panel" hx-swap="outerHTML"
                               th:text="${p}">1</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- email check feedback (targeted swap) -->
<th:block th:fragment="emailFeedback">
    <small th:if="${emailCheckedOk}" class="text-primary">* 사용 가능</small>
    <small th:if="${emailCheckedOk == false}" class="text-danger">이메일이 확인되지 않았거나 이미 사용 중입니다.</small>
</th:block>
</body>
</html>

<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/admin}">
<head>
    <th:block layout:fragment="seo">
        <title th:text="'서비스 이용약관 — ' + ${appName}">서비스 이용약관</title>
    </th:block>
</head>
<body>
<div layout:fragment="content">
    <div class="page-body px-xl-3">
        <div class="container-xl">
            <div id="setting-msg"></div>
            <div class="row">
                <div class="col-xl-8 mb-2">
                    <div class="card">
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label">서비스 이용약관 (HTML)</label>
                                <textarea id="hugerte-editor" th:text="${terms}"></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="d-flex justify-content-end mt-2 mb-3">
                        <button id="updateBtn" type="button" class="btn btn-primary">업데이트</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="js">
    <script src="https://cdn.jsdelivr.net/npm/hugerte@1/hugerte.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            hugeRTE.init({
                selector: '#hugerte-editor', height: 600, menubar: false, statusbar: false, license_key: 'gpl',
                plugins: ['advlist','autolink','lists','link','image','charmap','preview','anchor','searchreplace','visualblocks','code','fullscreen','insertdatetime','media','table','help','wordcount'],
                toolbar: 'undo redo | formatselect | bold italic backcolor | alignleft aligncenter alignright alignjustify | bullist numlist outdent indent | removeformat'
            });
        });
        document.getElementById('updateBtn').addEventListener('click', function () {
            var content = hugeRTE.get('hugerte-editor').getContent();
            htmx.ajax('POST', '/admin/setting/terms', { values: { terms: content }, target: '#setting-msg', swap: 'innerHTML' });
        });
    </script>
</th:block>
</body>
</html>

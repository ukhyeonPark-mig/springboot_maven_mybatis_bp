<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
    <meta http-equiv="X-UA-Compatible" content="ie=edge"/>

    <th:block layout:fragment="seo">
        <title th:text="'오류 — ' + ${appName}">오류</title>
    </th:block>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/css/tabler.min.css"/>
    <style>
        html { margin-left: 0 !important; }
        a, a:hover, a:focus, a:active, a:visited { text-decoration: none; }
        a:not(.btn), a:not(.btn):hover, a:not(.btn):focus,
        a:not(.btn):active, a:not(.btn):visited { color: inherit; }
    </style>
    <th:block layout:fragment="css"></th:block>
</head>

<body class="border-top-wide border-primary">
    <th:block layout:fragment="content"></th:block>

    <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/js/tabler.min.js" defer></script>
    <th:block layout:fragment="js"></th:block>
</body>
</html>

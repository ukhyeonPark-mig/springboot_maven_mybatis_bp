<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="topbar">
    <header class="navbar navbar-expand-md d-print-none d-none d-lg-flex">
        <div class="container-xl d-flex">
            <div class="navbar-nav flex-row order-md-last ms-auto">
                <div class="nav-item dropdown">
                    <a href="javascript:void(0)" class="nav-link d-flex lh-1 p-0 px-2" data-bs-toggle="dropdown" aria-label="Open user menu">
                        <span class="avatar avatar-sm"
                              th:style="${#authentication.principal.profileImage != null}
                                        ? ('background-image: url(' + ${r2PublicUrl} + '/user/profile_image/100/' + ${#authentication.principal.profileImage} + ')')
                                        : ''">
                            <th:block th:if="${#authentication.principal.profileImage == null}" th:text="${#authentication.principal.initial}">A</th:block>
                        </span>
                        <div class="d-none d-xl-block ps-2">
                            <div th:text="${#authentication.principal.name}">이름</div>
                            <div class="mt-1 small text-secondary" th:text="${#authentication.principal.email}">email</div>
                        </div>
                    </a>
                    <div class="dropdown-menu dropdown-menu-end dropdown-menu-arrow">
                        <a th:href="@{/admin/account/profile}" class="dropdown-item" th:text="#{nav.profile}">프로필 수정</a>
                        <a th:href="@{/admin/account/password}" class="dropdown-item" th:text="#{nav.password}">비밀번호 변경</a>
                        <div class="dropdown-divider"></div>
                        <a th:href="@{/admin/logout}" class="dropdown-item" th:text="#{btn.logout}">로그아웃</a>
                    </div>
                </div>
            </div>
        </div>
    </header>
</th:block>
</body>
</html>

<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="sidebar">
    <aside class="navbar navbar-vertical navbar-expand-lg" data-bs-theme="dark">
        <div class="container-fluid">

            <!-- 모바일 브랜드 -->
            <div class="navbar-brand navbar-brand-autodark d-flex d-lg-none">
                <a th:href="@{/admin/dashboard}">
                    <img th:if="${hasLogoWhiteSvg}" th:src="@{/branding/logo_white.svg}" style="max-width:120px" th:alt="${appName}">
                    <span th:unless="${hasLogoWhiteSvg}" class="text-white fw-bold" th:text="${appName}">BP</span>
                </a>
            </div>

            <button class="navbar-toggler ms-auto me-2" type="button" data-bs-toggle="collapse" data-bs-target="#sidebar-menu"
                    aria-controls="sidebar-menu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- 모바일 사용자 드롭다운 -->
            <a href="javascript:void(0)" class="nav-link d-flex d-lg-none lh-1 p-0 px-2" data-bs-toggle="dropdown" aria-label="Open user menu">
                <span class="avatar avatar-sm"
                      th:style="${#authentication.principal.profileImage != null}
                                ? ('background-image: url(' + ${r2PublicUrl} + '/user/profile_image/100/' + ${#authentication.principal.profileImage} + ')')
                                : ''">
                    <th:block th:if="${#authentication.principal.profileImage == null}" th:text="${#authentication.principal.initial}">A</th:block>
                </span>
                <div class="d-none d-xl-block ps-2">
                    <div th:text="${#authentication.principal.name}">이름</div>
                    <div class="mt-1 small text-secondary" th:text="${#authentication.principal.email}">email</div>
                </div>
            </a>
            <div class="dropdown-menu dropdown-menu-end dropdown-menu-arrow">
                <a th:href="@{/admin/account/profile}" class="dropdown-item">프로필</a>
                <a th:href="@{/admin/account/password}" class="dropdown-item">비밀번호</a>
                <div class="dropdown-divider"></div>
                <a th:href="@{/admin/logout}" class="dropdown-item" th:text="#{btn.logout}">로그아웃</a>
            </div>

            <!-- 데스크톱 브랜드 -->
            <div class="navbar-brand navbar-brand-autodark d-none d-lg-flex">
                <a th:href="@{/admin/dashboard}" class="mt-2">
                    <img th:if="${hasLogoWhiteSvg}" th:src="@{/branding/logo_white.svg}" style="max-width:120px" th:alt="${appName}">
                    <span th:unless="${hasLogoWhiteSvg}" class="text-white fw-bold" th:text="${appName}">BP</span>
                </a>
            </div>

            <div class="collapse navbar-collapse" id="sidebar-menu">
                <ul class="navbar-nav pt-lg-3">
                    <li class="nav-item" th:classappend="${#strings.contains(currentUri, '/admin/dashboard')} ? 'active'">
                        <a class="nav-link" th:href="@{/admin/dashboard}">
                            <span class="nav-link-icon d-md-none d-lg-inline-block">
                                <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 13m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" /><path d="M13.45 11.55l2.05 -2.05" /><path d="M6.4 20a9 9 0 1 1 11.2 0z" /></svg>
                            </span>
                            <span class="nav-link-title" th:text="#{nav.dashboard}">대시보드</span>
                        </a>
                    </li>

                    <th:block th:if="${#authentication.principal.admin}">
                        <li class="nav-item" th:classappend="${#strings.contains(currentUri, '/admin/user')} ? 'active'">
                            <a class="nav-link" th:href="@{/admin/user}">
                                <span class="nav-link-icon d-md-none d-lg-inline-block">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M8 7a4 4 0 1 0 8 0a4 4 0 0 0 -8 0" /><path d="M6 21v-2a4 4 0 0 1 4 -4h4a4 4 0 0 1 4 4v2" /></svg>
                                </span>
                                <span class="nav-link-title" th:text="#{nav.users}">사용자</span>
                            </a>
                        </li>

                        <!-- 설정 드롭다운 -->
                        <li class="nav-item dropdown" th:with="open=${#strings.contains(currentUri, '/admin/setting')}"
                            th:classappend="${open} ? 'active'">
                            <a class="nav-link dropdown-toggle" th:classappend="${open} ? 'show'" href="#navbar-setting"
                               data-bs-toggle="dropdown" data-bs-auto-close="false" role="button" th:attr="aria-expanded=${open}">
                                <span class="nav-link-icon d-md-none d-lg-inline-block">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M10.325 4.317c.426 -1.756 2.924 -1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543 -.94 3.31 .826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756 .426 1.756 2.924 0 3.35a1.724 1.724 0 0 0 -1.066 2.573c.94 1.543 -.826 3.31 -2.37 2.37a1.724 1.724 0 0 0 -2.572 1.065c-.426 1.756 -2.924 1.756 -3.35 0a1.724 1.724 0 0 0 -2.573 -1.066c-1.543 .94 -3.31 -.826 -2.37 -2.37a1.724 1.724 0 0 0 -1.065 -2.572c-1.756 -.426 -1.756 -2.924 0 -3.35a1.724 1.724 0 0 0 1.066 -2.573c-.94 -1.543 .826 -3.31 2.37 -2.37c1 .608 2.296 .07 2.572 -1.065z" /><path d="M9 12a3 3 0 1 0 6 0a3 3 0 0 0 -6 0" /></svg>
                                </span>
                                <span class="nav-link-title" th:text="#{nav.settings}">설정</span>
                            </a>
                            <div class="dropdown-menu" th:classappend="${open} ? 'show'">
                                <a class="dropdown-item" th:classappend="${#strings.contains(currentUri, '/admin/setting/branding')} ? 'active'" th:href="@{/admin/setting/branding}" th:text="#{nav.branding}">브랜딩</a>
                                <a class="dropdown-item" th:classappend="${#strings.contains(currentUri, '/admin/setting/information')} ? 'active'" th:href="@{/admin/setting/information}" th:text="#{nav.information}">버전 및 라이선스 정보</a>
                                <a class="dropdown-item" th:classappend="${#strings.contains(currentUri, '/admin/setting/privacy')} ? 'active'" th:href="@{/admin/setting/privacy}" th:text="#{nav.privacy}">개인정보 처리방침</a>
                                <a class="dropdown-item" th:classappend="${#strings.contains(currentUri, '/admin/setting/terms')} ? 'active'" th:href="@{/admin/setting/terms}" th:text="#{nav.terms}">서비스 이용약관</a>
                            </div>
                        </li>

                        <!-- 시스템 드롭다운 -->
                        <li class="nav-item dropdown" th:with="open=${#strings.contains(currentUri, '/admin/development')}"
                            th:classappend="${open} ? 'active'">
                            <a class="nav-link dropdown-toggle" th:classappend="${open} ? 'show'" href="#navbar-development"
                               data-bs-toggle="dropdown" data-bs-auto-close="false" role="button" th:attr="aria-expanded=${open}">
                                <span class="nav-link-icon d-md-none d-lg-inline-block">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 13.5l-1.5 -1.5l1.5 -1.5" /><path d="M15.5 10.5l1.5 1.5l-1.5 1.5" /><path d="M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0" /></svg>
                                </span>
                                <span class="nav-link-title" th:text="#{nav.system}">시스템</span>
                            </a>
                            <div class="dropdown-menu" th:classappend="${open} ? 'show'">
                                <a th:if="${isLocal}" class="dropdown-item" th:classappend="${#strings.contains(currentUri, '/admin/development/database')} ? 'active'" th:href="@{/admin/development/database}" th:text="#{nav.database}">데이터베이스</a>
                                <a class="dropdown-item" th:classappend="${#strings.contains(currentUri, '/admin/development/logs')} ? 'active'" th:href="@{/admin/development/logs}" th:text="#{nav.logs}">로그</a>
                                <a class="dropdown-item" th:classappend="${#strings.contains(currentUri, '/admin/development/php')} ? 'active'" th:href="@{/admin/development/php}" th:text="#{nav.phpinfo}">SystemInfo</a>
                                <a class="dropdown-item" th:classappend="${#strings.contains(currentUri, '/admin/development/backup')} ? 'active'" th:href="@{/admin/development/backup}" th:text="#{nav.backup}">백업</a>
                            </div>
                        </li>
                    </th:block>

                    <li class="nav-item mt-3">
                        <a class="nav-link" th:href="@{/}" target="_blank">
                            <span class="nav-link-icon d-md-none d-lg-inline-block">
                                <svg xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l-2 0l9 -9l9 9l-2 0" /><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-7" /><path d="M9 21v-6a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v6" /></svg>
                            </span>
                            <span class="nav-link-title" th:text="#{nav.landing}">랜딩 페이지</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </aside>
</th:block>
</body>
</html>

<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:fragment="navbar">
    <header class="navbar navbar-expand-md d-print-none">
        <div class="container-xl">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar-menu"
                    aria-controls="navbar-menu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="navbar-brand navbar-brand-autodark d-none-navbar-horizontal pe-0 pe-md-3 px-2">
                <a th:href="@{/}" style="text-decoration: none; color: inherit;">
                    <img th:if="${hasLogoColorSvg}" th:src="@{/branding/logo_color.svg}"
                         th:alt="${appName}" width="160">
                    <span th:unless="${hasLogoColorSvg}" class="fw-bold fs-3" th:text="${appName}">BP</span>
                </a>
            </div>

            <div class="navbar-nav flex-row order-md-last">
                <!-- 비로그인 사용자 -->
                <div class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link d-flex lh-1 p-0 px-2" th:href="@{/signin}">
                        <svg class="d-none d-md-block" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 7a4 4 0 1 0 8 0a4 4 0 0 0 -8 0"></path><path d="M6 21v-2a4 4 0 0 1 4 -4h4a4 4 0 0 1 4 4v2"></path></svg>
                        <div class="ps-2 d-none d-md-block"><span class="fw-bold" th:text="#{btn.login}">로그인</span></div>
                        <span class="avatar avatar-2 bg-blue-lt d-block d-md-none">
                            <svg class="mt-2" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 7a4 4 0 1 0 8 0a4 4 0 0 0 -8 0"></path><path d="M6 21v-2a4 4 0 0 1 4 -4h4a4 4 0 0 1 4 4v2"></path></svg>
                        </span>
                    </a>
                </div>

                <!-- 로그인 사용자 -->
                <div class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <span class="nav-link d-flex lh-1 p-0 px-2" data-bs-toggle="dropdown" aria-label="Open user menu" style="cursor: pointer;">
                        <div class="d-none d-xl-block pe-2 text-end">
                            <div th:text="${#authentication.principal.name}">이름</div>
                            <div class="mt-1 small text-secondary" th:text="${#authentication.principal.email}">email</div>
                        </div>
                        <span class="avatar avatar-2 bg-blue-lt">
                            <img alt="프로필 이미지" class="rounded"
                                 th:src="${#authentication.principal.profileImage != null}
                                         ? (${r2PublicUrl} + '/user/profile_image/100/' + ${#authentication.principal.profileImage})
                                         : @{/image/no_profile_image.webp}">
                        </span>
                    </span>
                    <div class="dropdown-menu dropdown-menu-end dropdown-menu-arrow">
                        <a th:if="${#authentication.principal.admin}" th:href="@{/admin/dashboard}" class="dropdown-item" th:text="#{nav.dashboard}">대시보드</a>
                        <a th:href="@{/client/profile}" class="dropdown-item" th:text="#{nav.profile}">프로필 수정</a>
                        <a th:href="@{/client/password}" class="dropdown-item" th:text="#{nav.password}">비밀번호 변경</a>
                        <div class="dropdown-divider"></div>
                        <a th:href="@{/logout}" class="dropdown-item" th:text="#{btn.logout}">로그아웃</a>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <header class="navbar-expand-md">
        <div class="collapse navbar-collapse" id="navbar-menu">
            <div class="navbar">
                <div class="container-xl">
                    <div class="row flex-column flex-md-row flex-fill align-items-center">
                        <div class="col">
                            <ul class="navbar-nav">
                                <li class="nav-item">
                                    <a class="nav-link" th:href="@{/}"><span class="nav-link-title fw-bold" th:text="#{nav.home}">홈</span></a>
                                </li>
                            </ul>
                        </div>
                        <div class="col col-md-auto">
                            <ul class="navbar-nav">
                                <li class="nav-item">
                                    <div class="btn-list">
                                        <a class="btn btn-primary mx-2 mt-3 mb-2 mt-md-2 w-100" th:href="@{/contact}">
                                            <span class="nav-link-title fw-bold" th:text="#{btn.contact}">문의하기</span>
                                        </a>
                                    </div>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
</th:block>
</body>
</html>
